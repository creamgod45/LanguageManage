name: 功能需求 / Feature request
description: 提議新的使用流程、管理能力、IDE 整合或品質分析
title: "[Feature] "
labels:
  - enhancement
type: feature
body:
  - type: markdown
    attributes:
      value: 請先描述使用情境與要解決的問題，再提出介面或 API 方案。
  - type: dropdown
    id: area
    attributes:
      label: 功能類型
      options:
        - 方案管理
        - 翻譯表／搜尋／批量操作
        - Parser／新格式
        - 問題分析／修復建議
        - Diff／衝突處理
        - IDE 原生功能整合
        - 多國語言／可及性
        - 效能／快取
        - 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 使用情境與問題
      description: 誰在什麼情境遇到什麼限制？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建議方案
      description: 說明操作流程、按鈕位置、輸入輸出或 API 行為。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考慮的替代方案
  - type: checkboxes
    id: constraints
    attributes:
      label: 設計限制確認
      options:
        - label: 此需求不要求插件自動納管未經使用者選取的檔案。
          required: true
        - label: 若功能會修改檔案，我同意寫入前應提供 Diff／確認機制。
          required: true
        - label: 我已搜尋既有 issues，沒有找到相同需求。
          required: true
