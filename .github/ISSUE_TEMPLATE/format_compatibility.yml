name: 格式相容性 / Format compatibility
description: 回報 JSON、YAML 或 Laravel PHP 無法安全解析或 round-trip 的案例
title: "[Format] "
labels:
  - parser
body:
  - type: dropdown
    id: format
    attributes:
      label: 檔案格式
      options:
        - JSON
        - YAML / YML
        - Laravel PHP
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: 插件版本
      placeholder: 例如 1.1.1
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: 可重現的最小檔案
      description: 請勿包含客戶或敏感資料。
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 預期的 key／value 與寫回結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 實際解析結果或錯誤訊息
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 安全確認
      options:
        - label: 範例是純資料，不要求執行 PHP 函式或任意程式碼。
          required: true
        - label: 我已確認範例不包含敏感資訊。
          required: true
