name: 錯誤回報 / Bug report
description: 回報可重現的插件錯誤、無回應、資料顯示或寫入問題
title: "[Bug] "
labels:
  - bug
type: bug
body:
  - type: markdown
    attributes:
      value: |
        感謝回報。請勿附上密碼、token、客戶資料或完整私有語言檔；請提供可重現的最小範例。
  - type: dropdown
    id: area
    attributes:
      label: 問題區域
      options:
        - 方案建立／載入／RPC
        - JSON／YAML／PHP 解析
        - 翻譯表／搜尋／分頁
        - 新增／編輯／刪除／Key 改名
        - 問題分析／Diff／修復
        - WSL／遠端檔案／效能
        - 多國語言／介面
        - 其他
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: 插件版本
      placeholder: 例如 1.1.1
    validations:
      required: true
  - type: input
    id: ide
    attributes:
      label: IDE 與版本
      placeholder: 例如 PhpStorm 2026.1.3
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 作業系統／檔案環境
      placeholder: 例如 Windows 11 + WSL2 Ubuntu，或 macOS 15
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: 涉及格式
      options:
        - 不適用
        - JSON
        - YAML / YML
        - Laravel PHP
        - 多種格式
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 請使用可穩定重現的編號步驟。
      placeholder: |
        1. 建立方案並選擇…
        2. 點擊…
        3. 出現…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 預期結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 實際結果與完整錯誤訊息
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: 最小語言檔範例
      description: 請先移除敏感或商業內容。
      render: text
  - type: textarea
    id: logs
    attributes:
      label: 相關 IDE Log
      description: 僅貼與 LanguageManager 相關的片段，並移除使用者名稱、路徑與敏感資料。
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前確認
      options:
        - label: 我已搜尋既有 issues，沒有找到相同問題。
          required: true
        - label: 我已移除 log 與範例中的敏感資料。
          required: true
        - label: 我了解插件只會處理方案中明確選取的檔案。
          required: true
