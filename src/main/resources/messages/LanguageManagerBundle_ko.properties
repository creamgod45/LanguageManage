plugin.name=현지화 관리자 (LanguageManager)
plugin.description=<h3>한국어 설명</h3><p>프로젝트의 JSON, YAML 및 Laravel PHP 현지화 파일을 관리합니다. 서로 독립적인 파일 스킴을 만들고 결합된 테이블에서 번역을 검색하고 편집할 수 있습니다. 형식 오류, 누락 값, 중복 번역, 누락 언어 및 사용 현황 제안도 검토할 수 있습니다.</p><h3>English Description</h3><p>Manage JSON, YAML, and Laravel PHP localization files. Create isolated file schemes, search and edit translations in a joined table, detect malformed files, and review missing values, duplicates, missing locales, and usage suggestions.</p>
