plugin.name=ตัวจัดการโลคัลไลเซชัน (LanguageManager)
plugin.description=<h3>คำอธิบายภาษาไทย</h3><p>จัดการไฟล์โลคัลไลเซชันรูปแบบ JSON, YAML, PHP ของ Laravel และ ResourceBundle Properties สร้างรูปแบบไฟล์ที่แยกจากกัน ค้นหาและแก้ไขคำแปลในตารางรวม ตรวจหาไฟล์ที่มีรูปแบบผิด และตรวจสอบค่าที่ขาดหาย ค่าซ้ำ ภาษาที่ขาด และคำแนะนำการใช้งาน</p><h3>English Description</h3><p>Manage JSON, YAML, Laravel PHP, and ResourceBundle Properties localization files. Create isolated file schemes, search and edit translations in a joined table, detect malformed files, and review missing values, duplicates, missing locales, and usage suggestions.</p>
