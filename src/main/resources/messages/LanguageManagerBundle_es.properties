plugin.name=Gestor de localización (LanguageManager)
plugin.description=<h3>Descripción en español</h3><p>Gestiona archivos de localización JSON, YAML, PHP de Laravel y ResourceBundle Properties. Crea esquemas de archivos aislados, busca y edita traducciones en una tabla combinada, detecta archivos incorrectos y revisa valores ausentes, duplicados, idiomas faltantes y sugerencias de uso.</p><h3>English Description</h3><p>Manage JSON, YAML, Laravel PHP, and ResourceBundle Properties localization files. Create isolated file schemes, search and edit translations in a joined table, detect malformed files, and review missing values, duplicates, missing locales, and usage suggestions.</p>
