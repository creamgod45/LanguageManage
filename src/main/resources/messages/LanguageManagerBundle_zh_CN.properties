plugin.name=本地化管理器 (LanguageManager)
plugin.description=<h3>中文说明</h3><p>管理项目中的 JSON、YAML 与 Laravel PHP 本地化语言文件。可创建彼此独立的文件方案，使用表格搜索与编辑翻译，检查格式错误、缺失值、重复翻译、缺少语言及使用率建议。</p><h3>English Description</h3><p>Manage JSON, YAML, and Laravel PHP localization files. Create isolated file schemes, search and edit translations in a joined table, detect malformed files, and review missing values, duplicates, missing locales, and usage suggestions.</p>
