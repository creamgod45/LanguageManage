plugin.name=ローカライゼーションマネージャー (LanguageManager)
plugin.description=<h3>日本語の説明</h3><p>プロジェクト内の JSON、YAML、Laravel PHP のローカライズファイルを管理します。独立したファイルスキームを作成し、結合テーブルで翻訳を検索・編集できます。形式エラー、欠損値、重複翻訳、言語不足、使用状況の提案も確認できます。</p><h3>English Description</h3><p>Manage JSON, YAML, and Laravel PHP localization files. Create isolated file schemes, search and edit translations in a joined table, detect malformed files, and review missing values, duplicates, missing locales, and usage suggestions.</p>
